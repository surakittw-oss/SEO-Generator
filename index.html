<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEO · GEO · AEO Generator 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080808;
  --s1: #111;
  --s2: #181818;
  --b1: #222;
  --b2: #2e2e2e;
  --tx: #efefef;
  --muted: #555;
  --sub: #888;
  --green: #00d68f;
  --amber: #f5a623;
  --blue: #4f9cf9;
  --red: #e62227;
  --sans: 'Sarabun', sans-serif;
  --mono: 'IBM Plex Mono', monospace;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--tx);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* HEADER */
header {
  padding: 14px 32px;
  border-bottom: 1px solid var(--b1);
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0;
  background: rgba(8,8,8,0.96);
  backdrop-filter: blur(16px);
  z-index: 20;
}
.hd-left { display: flex; align-items: center; gap: 12px; }
.hd-logo { font-family: var(--mono); font-size: 13px; font-weight: 500; color: var(--tx); }
.hd-pills { display: flex; gap: 5px; }
.pill {
  font-family: var(--mono);
  font-size: 9px; font-weight: 500;
  letter-spacing: 1.5px;
  padding: 3px 7px;
  border-radius: 4px;
  border: 1px solid;
}
.pill-s { color: var(--green); border-color: rgba(0,214,143,0.4); background: rgba(0,214,143,0.07); }
.pill-g { color: var(--amber); border-color: rgba(245,166,35,0.4); background: rgba(245,166,35,0.07); }
.pill-a { color: var(--blue);  border-color: rgba(79,156,249,0.4); background: rgba(79,156,249,0.07); }
.hd-right { font-family: var(--mono); font-size: 10px; color: var(--muted); }
.dot-ok { display: inline-block; width:6px; height:6px; border-radius:50%; background: var(--green); margin-right:5px; }

/* MAIN */
main {
  flex: 1;
  display: grid;
  grid-template-columns: 460px 1fr;
  max-width: 1380px;
  width: 100%;
  margin: 0 auto;
  padding: 24px;
  gap: 20px;
}

/* PANEL */
.panel {
  background: var(--s1);
  border: 1px solid var(--b1);
  border-radius: 14px;
  display: flex; flex-direction: column;
  overflow: hidden;
}
.ph {
  padding: 13px 20px;
  border-bottom: 1px solid var(--b1);
  display: flex; align-items: center; justify-content: space-between;
}
.ph-label {
  font-size: 10px; font-weight: 600;
  letter-spacing: 2.5px; text-transform: uppercase;
  color: var(--sub);
  display: flex; align-items: center; gap: 8px;
}
.ph-label::before {
  content: '';
  width: 3px; height: 14px;
  border-radius: 2px;
  background: var(--green);
}
.pb { padding: 20px; flex: 1; display: flex; flex-direction: column; gap: 16px; }

/* TEXTAREA */
.inp-label {
  font-size: 10px; font-weight: 600;
  letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--muted); margin-bottom: 7px;
}
textarea {
  width: 100%; flex: 1;
  min-height: 380px;
  background: rgba(255,255,255,0.02);
  border: 1px solid var(--b1);
  border-radius: 9px;
  color: var(--tx);
  font-family: var(--sans);
  font-size: 13.5px; line-height: 1.7;
  padding: 14px 16px;
  resize: vertical; outline: none;
  transition: border-color 0.15s;
}
textarea:focus { border-color: var(--b2); }
textarea::placeholder { color: var(--muted); font-size: 12.5px; }
.char-row {
  display: flex; justify-content: space-between;
  font-family: var(--mono); font-size: 10px; color: var(--muted);
}

/* GENERATE BTN */
.btn-gen {
  width: 100%; padding: 14px;
  background: var(--green);
  border: none; border-radius: 9px;
  color: #000;
  font-family: var(--sans); font-size: 13px; font-weight: 700;
  cursor: pointer;
  transition: all 0.15s;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.btn-gen:hover:not(:disabled) { background: #00c07e; transform: translateY(-1px); box-shadow: 0 6px 24px rgba(0,214,143,0.25); }
.btn-gen:active { transform: translateY(0); }
.btn-gen:disabled { background: var(--b2); color: var(--muted); cursor: not-allowed; transform: none; box-shadow: none; }

/* OUTPUT */
.out-body { padding: 20px; flex: 1; display: flex; flex-direction: column; gap: 14px; overflow-y: auto; }

/* EMPTY STATE */
.empty {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 10px; padding: 60px 20px;
  color: var(--muted); font-size: 13px; text-align: center;
}
.empty-icon {
  width: 48px; height: 48px;
  border: 1px dashed var(--b2); border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; margin-bottom: 6px;
}

/* RESULT CARDS */
.rcard {
  border: 1px solid var(--b1);
  border-radius: 12px; overflow: hidden;
  transition: border-color 0.15s;
  animation: fadeIn 0.3s ease both;
}
.rcard:hover { border-color: var(--b2); }
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}
.rcard-head {
  padding: 10px 16px;
  background: rgba(255,255,255,0.02);
  border-bottom: 1px solid var(--b1);
  display: flex; align-items: center; justify-content: space-between;
}
.rcard-num {
  font-family: var(--mono); font-size: 10px;
  color: var(--green); font-weight: 500;
}
.rcard-focus {
  font-size: 11px; color: var(--sub); margin-left: 8px;
}
.btn-cp {
  padding: 4px 10px;
  border: 1px solid var(--b2); border-radius: 5px;
  background: transparent; color: var(--sub);
  font-size: 11px; font-family: var(--sans);
  cursor: pointer; transition: all 0.15s;
}
.btn-cp:hover { border-color: var(--green); color: var(--green); }
.btn-cp.ok { border-color: var(--green); color: var(--green); background: rgba(0,214,143,0.08); }

.rcard-body { padding: 14px 16px; display: flex; flex-direction: column; gap: 10px; }
.frow { display: flex; flex-direction: column; gap: 3px; }
.flabel {
  font-size: 9px; font-weight: 600;
  letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--muted);
}
.fval { font-size: 12.5px; color: var(--tx); line-height: 1.55; }
.fval.kw { color: var(--amber); font-weight: 600; }
.fval.meta { color: var(--sub); font-size: 12px; }
.fval.slug {

  border: 1px solid rgba(0,214,143,0.15);

  display: inline-block;

.hdiv { height: 1px; background: var(--b1); }

/* EXTRAS */
.extras {
  border: 1px solid rgba(79,156,249,0.2);
  border-radius: 12px; padding: 14px 16px;
  background: rgba(79,156,249,0.04);
}
.extras-title {
  font-size: 10px; font-weight: 600;
  letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--blue); margin-bottom: 10px;
}
.extras-body { font-size: 12px; color: var(--sub); line-height: 1.8; }
.extras-body strong { color: var(--tx); }

/* COPY ALL */
.btn-copy-all {

  border: 1px solid var(--b2); border-radius: 6px;
  background: transparent; color: var(--sub);

  display: none;

.btn-copy-all:hover { border-color: var(--green); color: var(--green); }

/* TOAST */
.toast {
  position: fixed; bottom: 24px; right: 24px;
  padding: 11px 18px;
  background: var(--s1);
  border: 1px solid var(--green);
  border-radius: 9px;
  font-size: 12px; color: var(--green);
  display: flex; align-items: center; gap: 7px;
  z-index: 100;
  transform: translateY(50px); opacity: 0;
  transition: all 0.2s ease;
  pointer-events: none;
}
.toast.show { transform: translateY(0); opacity: 1; }

footer {
  border-top: 1px solid var(--b1);
  padding: 12px 32px;
  display: flex; justify-content: space-between;
  font-family: var(--mono); font-size: 10px; color: var(--muted);

<script>
// ─── UTILS ───────────────────────────────────────────
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
let _cards = []
let _allText = ''

function onInput(v) {
  const n = v.length
  document.getElementById('char-count').textContent = n + ' ตัวอักษร'
  document.getElementById('char-badge').textContent = n + ' ตัวอักษร'
  document.getElementById('btn-gen').disabled = n < 30
}

function showToast(msg) {
  const t = document.getElementById('toast')
  document.getElementById('toast-msg').textContent = msg
  t.classList.add('show')
  setTimeout(() => t.classList.remove('show'), 2200)
}

function copyCard(i, btn) {
  navigator.clipboard.writeText(_cards[i]).then(() => {
    btn.textContent = 'Copied!'
    btn.classList.add('ok')
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('ok') }, 2000)
    showToast('Copied รูปแบบที่ ' + (i+1))
  })
}

function copyAll() {
  navigator.clipboard.writeText(_allText).then(() => showToast('Copied ทั้งหมดแล้ว!'))
}

// ─── CORE LOGIC (no API, pure JS) ────────────────────

// stopwords ภาษาไทย
const STOP_TH = new Set([
  'และ','ของ','ที่','ใน','มี','ให้','การ','จาก','โดย','ได้','นี้','เป็น','กับ','แต่',
  'หรือ','ซึ่ง','จะ','มา','ไม่','เพื่อ','ว่า','ไป','ออก','ขึ้น','ลง','ก็','ทำ','นั้น',
  'อยู่','แล้ว','ต้อง','ทาง','ถึง','ตาม','ทั้ง','เข้า','ส่ง','กัน','อีก','เมื่อ','เรา',
  'เขา','เธอ','มัน','คือ','ใช้','เพิ่ม','ร่วม','ไว้','นำ','พบ','กล่าว','เปิด','ปิด',
  'รับ','สู่','ผล','งาน','เวลา','หลัง','ก่อน','ระหว่าง','ด้วย','ต่อ','บน','ล่าง',
  'เหล่า','บาง','ทุก','ชาว','เอง','ซึ่ง','อัน','ซี','นา','คน','ที่สุด','โดย','สำหรับ',
  'ประมาณ','กว่า','เกี่ยว','เกี่ยวกับ','ความ','ทำให้','เริ่ม','ต่างๆ','ดัง','แบบ',
  'ดัง','ดัง','นับ','ถือ','เดิน','ไม่ว่า','ดังนั้น','อย่างไรก็ตาม','จึง','เพราะ'
])

// ดึง keywords สำคัญจากเนื้อหา (ไม่เอาชื่อคน นามสกุล)
function extractKeywords(text) {
  const words = text.match(/[\u0E00-\u0E7F]{3,}|[a-zA-Z]{3,}/g) || []
  const freq = {}
  words.forEach(w => {
    if (!STOP_TH.has(w) && !/^[A-Z][a-z]/.test(w)) {  // ไม่เอา PascalCase (ชื่อคน)
      freq[w] = (freq[w]||0) + 1
    }
  })
  return Object.entries(freq)
    .sort((a,b) => b[1]-a[1])
    .slice(0, 25)
    .map(e => e[0])
}

// ดึง topic หลักจากเนื้อหา
// ใช้บรรทัดแรกที่มีความยาวพอเหมาะ (10-120 ตัวอักษร)
function extractMainTopic(text) {
  const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 10)
  // เอาบรรทัดแรกที่ไม่ยาวเกิน 120 ตัวอักษร
  const firstLine = lines.find(l => l.length <= 120) || lines[0] || text.substring(0,100)
  // ตัดให้ไม่เกิน 80 ตัวอักษร
  return firstLine.length > 80 ? firstLine.substring(0,77)+'...' : firstLine
}

// แผนที่คำไทย → ภาษาอังกฤษสำหรับ slug (ขยายใหม่ครอบคลุมกว่าเดิม)
const TH_SLUG_MAP = [
  // เศรษฐกิจ/การเงิน
  ['เศรษฐกิจ','economy'],['การเงิน','finance'],['เงิน','money'],
  ['ราคา','price'],['ตลาด','market'],['หุ้น','stock'],['บาท','baht'],
  ['ดอกเบี้ย','interest'],['อัตรา','rate'],['ลงทุน','invest'],
  ['ธนาคาร','bank'],['แบงก์','bank'],['งบประมาณ','budget'],
  ['ภาษี','tax'],['กำไร','profit'],['ขาดทุน','loss'],
  // การเมือง/รัฐบาล
  ['รัฐบาล','government'],['นโยบาย','policy'],['นายกรัฐมนตรี','pm'],
  ['รัฐสภา','parliament'],['เลือกตั้ง','election'],['พรรค','party'],
  ['กฎหมาย','law'],['ศาล','court'],['รัฐมนตรี','minister'],
  // เทคโนโลยี
  ['เทคโนโลยี','tech'],['ดิจิทัล','digital'],['ปัญญาประดิษฐ์','ai'],
  ['คริปโต','crypto'],['บิทคอยน์','bitcoin'],['ซอฟต์แวร์','software'],
  ['แอปพลิเคชัน','app'],['อินเทอร์เน็ต','internet'],
  // พลังงาน/สิ่งแวดล้อม
  ['น้ำมัน','oil'],['พลังงาน','energy'],['สิ่งแวดล้อม','environment'],
  ['โซลาร์','solar'],['ไฟฟ้า','electric'],['ก๊าซ','gas'],
  // สังคม/สุขภาพ
  ['สุขภาพ','health'],['โรค','disease'],['วัคซีน','vaccine'],
  ['การศึกษา','education'],['โรงเรียน','school'],['มหาวิทยาลัย','university'],
  ['กีฬา','sport'],['บันเทิง','entertainment'],['ภาพยนตร์','film'],
  ['ดนตรี','music'],['ท่องเที่ยว','travel'],
  // ประเทศ/ภูมิภาค
  ['ไทย','thailand'],['จีน','china'],['สหรัฐ','usa'],['ยุโรป','europe'],
  ['อาเซียน','asean'],['ญี่ปุ่น','japan'],['เกาหลี','korea'],
  ['อินเดีย','india'],['รัสเซีย','russia'],['ยูเครน','ukraine'],
  // ธุรกิจ
  ['ธุรกิจ','business'],['บริษัท','company'],['สตาร์ทอัพ','startup'],
  ['อสังหาริมทรัพย์','property'],['การค้า','trade'],['ส่งออก','export'],
  // ข่าว/สื่อ
  ['ข่าว','news'],['รายงาน','report'],['วิเคราะห์','analysis'],
  ['สัมภาษณ์','interview'],['เปิดเผย','revealed'],['ประกาศ','announced'],
]

// สร้าง slug อัจฉริยะ
function makeSlug(text, topic) {
  // 1. เอาคำอังกฤษที่มีความหมาย (ไม่ใช่ชื่อคน) จาก text
  const enWords = (text.match(/\b[a-z][a-z0-9]{2,}\b/gi) || [])
    .filter(w => !['the','and','for','are','but','not','you','all','can','her',
                   'was','one','our','out','day','get','has','him','his','how',
                   'its','may','new','now','old','see','two','way','who','did',
                   'ask','big','end','far','got','let','put','say','too','use'].includes(w.toLowerCase()))
    .map(w => w.toLowerCase())

  // เอา unique en words ที่ปรากฏ > 1 ครั้ง หรือทั้งหมดถ้าน้อย
  const enFreq = {}
  enWords.forEach(w => enFreq[w] = (enFreq[w]||0)+1)
  const goodEn = Object.entries(enFreq).sort((a,b)=>b[1]-a[1]).map(e=>e[0])

  // 2. แปลงคำไทยสำคัญจาก text เป็น slug
  let slugParts = []
  for (const [th, en] of TH_SLUG_MAP) {
    if (text.includes(th) && !slugParts.includes(en)) {
      slugParts.push(en)
      if (slugParts.length >= 3) break
    }
  }

  // 3. เติม en words ที่มีความหมาย (ยกเว้น common words)
  goodEn.slice(0,3).forEach(w => {
    if (!slugParts.includes(w) && slugParts.length < 4) slugParts.push(w)
  })

  // 4. ถ้ายังน้อยเกินไป ดึงจาก topic ไทย
  if (slugParts.length < 2) {
    for (const [th, en] of TH_SLUG_MAP) {
      if (topic.includes(th) && !slugParts.includes(en)) {
        slugParts.push(en)
        if (slugParts.length >= 3) break
      }
    }
  }

  const slug = slugParts.slice(0,5).join('-')
  return slug || 'news-article'
}

// สร้าง Meta Description ตาม angle
function makeMeta(text, topic, keyword, angle) {
  // ดึงประโยคสำคัญจากเนื้อหา (ไม่ตัดกลางประโยค)
  const clean = text.replace(/\s+/g,' ').trim()
  // หาประโยคที่มี keyword
  const sentences = clean.split(/[.!?]/)
  const relevant = sentences.filter(s => s.includes(keyword) || s.includes(topic.substring(0,15)))
  const core = (relevant[0] || sentences[0] || clean).trim().substring(0, 250)

  const templates = {
    search:   `${topic} — ${core} อัปเดตข้อมูลล่าสุดและติดตามความเคลื่อนไหวได้ที่นี่`,
    emotion:  `รู้จัก${topic}ให้ลึกขึ้น ${core} ทำไมเรื่องนี้ถึงกระทบคุณโดยตรง`,
    geo:      `${topic} ${core} นี่คือข้อมูลที่ถูกต้องและครบถ้วนสำหรับการค้นหาบน AI Search`,
    voice:    `ถามว่า${topic}คืออะไร ตอบได้เลยว่า ${core} ค้นหาข้อมูลเพิ่มเติมได้ที่นี่`,
    balanced: `${core} ครบทุกมุมมองเกี่ยวกับ${topic} พร้อมวิเคราะห์เชิงลึกและข้อมูลล่าสุด`
  }
  return (templates[angle] || templates.balanced).substring(0,650).replace(/[",]/g,'').trim()
}

// สร้าง Titles ตาม angle (ใช้ topic จริงๆ ไม่ใช่แค่ keyword เดี่ยว)
function makeTitles(topic, keyword, idx) {
  // ตัด topic ให้พอดีกับ SEO title (60 ตัวอักษร)
  const shortTopic = topic.length > 45 ? topic.substring(0,42)+'...' : topic
  const shortKw    = keyword.length > 20 ? keyword.substring(0,18)+'...' : keyword

  const variants = [
    {
      focus:   'High Search Volume',
      seo:     `${shortTopic}`.substring(0,60),
      fb:      `เปิดทุกข้อมูล ${topic}`,
      twitter: `${topic} — อ่านก่อนใคร`
    },
    {
      focus:   'Emotional Hook',
      seo:     `ทำไม ${shortKw} ถึงสำคัญตอนนี้`.substring(0,60),
      fb:      `เรื่องของ ${topic} ที่คนส่วนใหญ่ยังไม่รู้`,
      twitter: `${topic} — เรื่องที่คุณไม่ควรพลาด`
    },
    {
      focus:   'GEO — AI Ready',
      seo:     `${shortTopic} ข้อมูลครบถ้วน`.substring(0,60),
      fb:      `${topic}: ข้อเท็จจริงที่ AI และ Google ยืนยัน`,
      twitter: `${topic} — ข้อมูลที่ AI อ้างอิงได้`
    },
    {
      focus:   'AEO — Voice Search',
      seo:     `${shortKw} คืออะไร ตอบทุกคำถาม`.substring(0,60),
      fb:      `ทุกคำถามเกี่ยวกับ ${topic} ตอบได้ที่นี่`,
      twitter: `${topic} — คำถามที่คนถามมากที่สุด`
    },
    {
      focus:   'Balanced All-in-one',
      seo:     `${shortTopic}`.substring(0,60),
      fb:      `${topic} — วิเคราะห์และอัปเดตล่าสุด`,
      twitter: `${topic} | ${shortKw}`
    }
  ]
  return variants[idx] || variants[4]
}

// ─── GENERATE ─────────────────────────────────────────
function generate() {
  const text = document.getElementById('txt').value.trim()
  if (!text) return

  const out = document.getElementById('out')
  document.getElementById('empty').style.display = 'none'
  document.getElementById('btn-copy-all').style.display = 'none'
  document.getElementById('btn-gen').disabled = true

  // วิเคราะห์ด้วย logic ใหม่
  const keywords = extractKeywords(text)
  const topic    = extractMainTopic(text)
  const mainKw   = keywords[0] || topic.substring(0,20)
  const slug     = makeSlug(text, topic)

  // Schema type detection
  let schema = 'NewsArticle'
  if (text.includes('วิธี') || text.includes('ขั้นตอน')) schema = 'HowTo'
  if (text.includes('คำถาม') || text.includes('FAQ')) schema = 'FAQPage'
  if (!text.includes('ข่าว') && !text.includes('รายงาน')) schema = 'Article'

  // Alt text
  const altText = `${mainKw} - ${topic.substring(0,80)}`.replace(/[",]/g,'').substring(0,125)

  const angles = ['search','emotion','geo','voice','balanced']
  _cards = []
  _allText = ''

  // สร้าง HTML
  let html = ''
  for (let i = 0; i < 5; i++) {
    const kw    = i < 3 ? keywords[i] || mainKw : mainKw
    const meta  = makeMeta(text, topic, kw, angles[i])
    const t     = makeTitles(topic, kw, i)
    const cardSlug = i === 0 ? slug : slug + (i > 0 ? '-' + ['', 'update', 'guide', 'explained', 'facts'][i] : '')

    const cardText = [
      `รูปแบบที่ ${i+1} — ${t.focus}`,
      `❇️ SEO Keyword: ${kw}`,
      `❇️ Meta Description: ${meta}`,
      `❇️ SEO Title: ${t.seo}`,
      `❇️ Facebook Title: ${t.fb}`,
      `❇️ Twitter (X): ${t.twitter}`,
      `❇️ URL Slug: /${cardSlug}`,
      `❇️ Alt Text: ${altText}`,
    ].join('\n')
    _cards.push(cardText)
    _allText += cardText + '\n\n---\n\n'

    html += `
    <div class="rcard" style="animation-delay:${i*0.07}s">
      <div class="rcard-head">
        <span>
          <span class="rcard-num">รูปแบบที่ ${i+1}</span>
          <span class="rcard-focus">— ${esc(t.focus)}</span>
        </span>
        <button class="btn-cp" onclick="copyCard(${i},this)">Copy</button>
      </div>
      <div class="rcard-body">
        <div class="frow">
          <span class="flabel">SEO Keyword</span>
          <span class="fval kw">${esc(kw)}</span>
        </div>
        <div class="hdiv"></div>
        <div class="frow">
          <span class="flabel">Meta Description</span>
          <span class="fval meta">${esc(meta)}</span>
        </div>
        <div class="hdiv"></div>
        <div class="frow">
          <span class="flabel">SEO Title</span>
          <span class="fval">${esc(t.seo)}</span>
        </div>
        <div class="frow">
          <span class="flabel">Facebook Title</span>
          <span class="fval">${esc(t.fb)}</span>
        </div>
        <div class="frow">
          <span class="flabel">Twitter (X)</span>
          <span class="fval">${esc(t.twitter)}</span>
        </div>
        <div class="hdiv"></div>
        <div class="frow">
          <span class="flabel">URL Slug</span>
          <span class="fval slug">/${esc(cardSlug)}</span>
        </div>
        <div class="frow">
          <span class="flabel">Alt Text</span>
          <span class="fval meta">${esc(altText)}</span>
        </div>
      </div>
    </div>`
  }

  // extras
  const entities = keywords.slice(0,5).join(', ')
  const extrasText = `\n💡 เพิ่มเติม\n• Schema Type: ${schema}\n• Keyword หลัก: ${mainKw}\n• แนะนำใส่ keyword "${mainKw}" ในบทความ 2-3 ครั้ง\n• GEO Entities: ${entities}`
  _allText += extrasText

  html += `
  <div class="extras">
    <div class="extras-title">💡 ข้อมูลเพิ่มเติม — Schema · Entity · GEO</div>
    <div class="extras-body">
      <div>• <strong>Schema Type:</strong> ${esc(schema)}</div>
      <div>• <strong>Focus Keyword:</strong> ${esc(mainKw)}</div>
      <div>• <strong>Keyword Density:</strong> แนะนำใส่ "${esc(mainKw)}" ในบทความ 2–3 ครั้ง</div>
      <div>• <strong>GEO Entities:</strong> ${esc(entities)}</div>
    </div>
  </div>`

  // inject
  out.innerHTML = html
  document.getElementById('btn-copy-all').style.display = 'inline-block'
  document.getElementById('btn-gen').disabled = false

  showToast('สร้าง 5 รูปแบบสำเร็จแล้ว!')
}
</script>
</body>
