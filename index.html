<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEO · GEO · AEO — 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600&family=Sarabun:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── TOKENS ─────────────────────────────────────────── */
:root {
  --bg:        #f5f5f7;
  --surface:   #ffffff;
  --surface2:  #fafafa;
  --border:    rgba(0,0,0,0.08);
  --border2:   rgba(0,0,0,0.12);
  --tx:        #1d1d1f;
  --tx2:       #6e6e73;
  --tx3:       #aeaeb2;
  --accent:    #0071e3;
  --accent-h:  #0077ed;
  --green:     #34c759;
  --amber:     #ff9500;
  --red:       #ff3b30;
  --sans:      'Sarabun', -apple-system, sans-serif;
  --mono:      'JetBrains Mono', monospace;
  --r-sm:      10px;
  --r-md:      16px;
  --r-lg:      22px;
  --r-xl:      28px;
  --shadow:    0 2px 12px rgba(0,0,0,0.06), 0 1px 3px rgba(0,0,0,0.04);
  --shadow-md: 0 8px 32px rgba(0,0,0,0.1), 0 2px 8px rgba(0,0,0,0.06);
}

/* ── RESET ──────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--tx);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ── HEADER ─────────────────────────────────────────── */
header {
  background: rgba(245,245,247,0.85);
  backdrop-filter: saturate(180%) blur(20px);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  height: 52px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 50;
}
.hlogo { display: flex; align-items: center; gap: 10px; }
.hlogo-text { font-size: 15px; font-weight: 600; letter-spacing: -0.3px; color: var(--tx); }
.hbadges { display: flex; gap: 4px; }
.hbadge {
  font-family: var(--mono); font-size: 9px; font-weight: 500;
  letter-spacing: 0.5px; padding: 2px 7px; border-radius: 20px;
}
.hb-seo { background: rgba(0,113,227,0.1); color: var(--accent); }
.hb-geo { background: rgba(255,149,0,0.1); color: var(--amber); }
.hb-aeo { background: rgba(52,199,89,0.1); color: var(--green); }
.hstatus { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--tx3); font-family: var(--mono); }
.sdot { width: 6px; height: 6px; border-radius: 50%; background: var(--tx3); transition: background .3s; }
.sdot.ok { background: var(--green); }
.sdot.ai { background: var(--accent); }

/* ── MAIN ───────────────────────────────────────────── */
.page {
  max-width: 1200px;
  margin: 0 auto;
  padding: 24px 16px 40px;
  display: grid;
  grid-template-columns: 380px 1fr;
  gap: 16px;
  align-items: start;
}

/* ── CARDS ──────────────────────────────────────────── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-xl);
  box-shadow: var(--shadow);
  overflow: hidden;
}
.card-head {
  padding: 16px 20px 14px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.card-title {
  font-size: 13px; font-weight: 600;
  letter-spacing: -0.2px; color: var(--tx);
  display: flex; align-items: center; gap: 8px;
}
.card-title-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--accent); flex-shrink: 0;
}
.card-body { padding: 16px 20px; display: flex; flex-direction: column; gap: 14px; }

/* ── PROVIDER TABS ──────────────────────────────────── */
.provider-wrap {
  background: var(--bg);
  border-radius: var(--r-md);
  padding: 3px;
  display: flex; gap: 2px;
}
.ptab {
  flex: 1; padding: 8px 4px;
  border: none; border-radius: 11px;
  background: transparent; cursor: pointer;
  transition: all .2s ease;
  display: flex; flex-direction: column;
  align-items: center; gap: 4px;
  font-family: var(--sans); font-size: 11px;
  font-weight: 500; color: var(--tx2);
}
.ptab:hover { background: rgba(255,255,255,0.6); color: var(--tx); }
.ptab.active {
  background: var(--surface);
  color: var(--tx);
  box-shadow: 0 1px 4px rgba(0,0,0,0.1), 0 0 0 0.5px rgba(0,0,0,0.06);
}
.ptab svg { width: 18px; height: 18px; opacity: 0.5; transition: opacity .2s; }
.ptab:hover svg, .ptab.active svg { opacity: 1; }
.ptab.active.ant svg { color: #c75000; }
.ptab.active.oai svg { color: #10a37f; }
.ptab.active.gem svg { color: #4285f4; }
.ptab-free {
  display: inline-block;
  font-size: 8px; font-weight: 600; letter-spacing: 0.5px;
  padding: 1px 5px; border-radius: 20px;
  background: rgba(52,199,89,0.15); color: var(--green);
  margin-top: 1px;
}

/* ── INPUTS ─────────────────────────────────────────── */
.field { display: flex; flex-direction: column; gap: 5px; }
.flabel {
  font-size: 11px; font-weight: 600;
  letter-spacing: 0.3px; color: var(--tx2);
}
.finput {
  width: 100%; padding: 10px 13px;
  background: var(--bg); border: 1px solid var(--border2);
  border-radius: var(--r-sm); color: var(--tx);
  font-family: var(--sans); font-size: 14px;
  outline: none; transition: border-color .15s, box-shadow .15s;
  -webkit-appearance: none;
}
.finput:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(0,113,227,0.15);
}
.finput::placeholder { color: var(--tx3); font-size: 13px; }
.finput[type="password"] { font-family: var(--mono); font-size: 12px; letter-spacing: 2px; }
.fhint { font-size: 11px; color: var(--tx3); line-height: 1.5; }
.fhint a { color: var(--accent); text-decoration: none; }

textarea.finput {
  min-height: 240px; resize: vertical;
  font-family: var(--sans); font-size: 13.5px; line-height: 1.7;
  letter-spacing: 0;
}
.charrow {
  display: flex; justify-content: space-between;
  font-family: var(--mono); font-size: 10px; color: var(--tx3);
}

/* ── MODE BADGE ─────────────────────────────────────── */
.mode-badge {
  display: flex; align-items: center; gap: 6px;
  padding: 8px 12px;
  background: var(--bg); border-radius: var(--r-sm);
  font-size: 11px; color: var(--tx2);
}
.mode-badge-dot { width: 6px; height: 6px; border-radius: 50%; }
.mode-badge.auto .mode-badge-dot { background: var(--green); }
.mode-badge.api .mode-badge-dot { background: var(--accent); animation: blink 2s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }

/* ── GENERATE BTN ───────────────────────────────────── */
.genbtn {
  width: 100%; padding: 13px;
  background: var(--accent); border: none;
  border-radius: var(--r-md); color: #fff;
  font-family: var(--sans); font-size: 15px; font-weight: 600;
  cursor: pointer; transition: all .2s ease;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  letter-spacing: -0.2px;
}
.genbtn:hover { background: var(--accent-h); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(0,113,227,0.35); }
.genbtn:active { transform: translateY(0); box-shadow: none; }
.genbtn:disabled {
  background: var(--tx3); cursor: not-allowed;
  transform: none; box-shadow: none;
}

/* ── OUTPUT ─────────────────────────────────────────── */
.out-col { display: flex; flex-direction: column; gap: 12px; }

/* EMPTY STATE */
.empty {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r-xl); box-shadow: var(--shadow);
  padding: 60px 20px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 8px; text-align: center;
  color: var(--tx2); font-size: 14px;
}
.empty-icon {
  width: 52px; height: 52px;
  background: var(--bg); border-radius: 16px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; margin-bottom: 6px;
}
.empty small { font-size: 12px; color: var(--tx3); }

/* LOADER */
.loader {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r-xl); box-shadow: var(--shadow);
  padding: 60px 20px;
  display: none; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 12px; text-align: center; color: var(--tx2); font-size: 13px;
}
.loader.show { display: flex; }
.spin {
  width: 28px; height: 28px;
  border: 2.5px solid var(--border2);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* RESULT CARD */
.rcard {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r-xl); box-shadow: var(--shadow);
  overflow: hidden;
  animation: fadeup .3s ease both;
}
@keyframes fadeup { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
.rcard-head {
  padding: 14px 18px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.rcard-num {
  font-family: var(--mono); font-size: 10px;
  color: var(--accent); font-weight: 500;
  background: rgba(0,113,227,0.08);
  padding: 2px 8px; border-radius: 20px;
}
.rcard-focus { font-size: 12px; color: var(--tx2); margin-left: 8px; }
.cpbtn {
  padding: 5px 12px;
  border: 1px solid var(--border2); border-radius: 8px;
  background: var(--bg); color: var(--tx2);
  font-size: 12px; font-family: var(--sans); font-weight: 500;
  cursor: pointer; transition: all .15s;
}
.cpbtn:hover { border-color: var(--accent); color: var(--accent); background: rgba(0,113,227,0.05); }
.cpbtn.ok { border-color: var(--green); color: var(--green); background: rgba(52,199,89,0.06); }
.rcard-body { padding: 14px 18px; display: flex; flex-direction: column; gap: 11px; }
.frow { display: flex; flex-direction: column; gap: 3px; }
.flbl2 {
  font-size: 9px; font-weight: 600; letter-spacing: 1.5px;
  text-transform: uppercase; color: var(--tx3);
}
.fval { font-size: 13px; color: var(--tx); line-height: 1.55; }
.fval.kw { color: var(--amber); font-weight: 600; font-size: 14px; }
.fval.meta { color: var(--tx2); font-size: 12px; line-height: 1.65; }
.fval.slug {
  font-family: var(--mono); font-size: 11px;
  color: var(--accent);
  background: rgba(0,113,227,0.06);
  border: 1px solid rgba(0,113,227,0.15);
  padding: 5px 10px; border-radius: 8px;
  display: inline-block;
}
.hdiv { height: 1px; background: var(--border); }

/* EXTRAS */
.extras {
  background: var(--surface); border: 1px solid rgba(0,113,227,0.15);
  border-radius: var(--r-xl); box-shadow: var(--shadow);
  padding: 16px 18px;
  animation: fadeup .3s ease both;
}
.etitle {
  font-size: 11px; font-weight: 600; letter-spacing: 1px;
  text-transform: uppercase; color: var(--accent); margin-bottom: 10px;
}
.ebody { font-size: 12px; color: var(--tx2); line-height: 1.8; }
.ebody strong { color: var(--tx); }

/* COPY ALL */
.cpall-btn {
  padding: 5px 13px;
  border: 1px solid var(--border2); border-radius: 8px;
  background: var(--bg); color: var(--tx2);
  font-size: 12px; font-family: var(--sans); font-weight: 500;
  cursor: pointer; transition: all .15s;
  display: none;
}
.cpall-btn:hover { border-color: var(--accent); color: var(--accent); }

/* TOAST */
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(60px);
  padding: 11px 20px;
  background: rgba(29,29,31,0.92); backdrop-filter: blur(10px);
  border-radius: 100px; font-size: 13px; color: #fff;
  display: flex; align-items: center; gap: 8px;
  z-index: 100; opacity: 0;
  transition: all .25s cubic-bezier(0.34, 1.56, 0.64, 1);
  pointer-events: none; white-space: nowrap;
}
.toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

/* ── RESPONSIVE ─────────────────────────────────────── */
@media (max-width: 900px) {
  .page { grid-template-columns: 1fr; padding: 16px 12px 32px; gap: 14px; }
  .out-col { gap: 10px; }
}
@media (max-width: 600px) {
  header { padding: 0 16px; }
  .hlogo-text { font-size: 14px; }
  .page { padding: 12px 10px 28px; gap: 10px; }
  .card-body { padding: 14px 16px; gap: 12px; }
  .rcard-body { padding: 12px 16px; }
  .rcard-head { padding: 12px 16px; }
  .genbtn { font-size: 14px; padding: 12px; }
  .ptab { font-size: 10px; padding: 7px 4px; }
  textarea.finput { min-height: 180px; }
}
@media (max-width: 400px) {
  .hbadges { display: none; }
  .page { padding: 10px 8px 24px; }
}
</style>
</head>
<body>

<header>
  <div class="hlogo">
    <div class="hbadges">
      <span class="hbadge hb-seo">SEO</span>
      <span class="hbadge hb-geo">GEO</span>
      <span class="hbadge hb-aeo">AEO</span>
    </div>
    <span class="hlogo-text">Generator 2026</span>
  </div>
  <div class="hstatus">
    <div class="sdot" id="sdot"></div>
    <span id="stext">พร้อมใช้งาน</span>
  </div>
</header>

<div class="page">

  <!-- LEFT: INPUT -->
  <div style="display:flex;flex-direction:column;gap:12px">
    <div class="card">
      <div class="card-head">
        <span class="card-title"><span class="card-title-dot"></span>AI Provider</span>
      </div>
      <div class="card-body">
        <!-- PROVIDER TABS -->
        <div class="provider-wrap">
          <button class="ptab active ant" id="tab-free" onclick="setProvider('free')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
            <span>Auto</span>
            <span class="ptab-free">ฟรี</span>
          </button>
          <button class="ptab oai" id="tab-ant" onclick="setProvider('anthropic')">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M13.827 3.52h3.603L24 20h-3.603l-6.57-16.48zm-3.654 0H6.57L0 20h3.603l1.357-3.415h6.165l1.358 3.415h3.603L10.173 3.52zm-3.88 10.215 1.993-5.005 1.992 5.005H6.293z"/></svg>
            <span>Anthropic</span>
          </button>
          <button class="ptab gem" id="tab-oai" onclick="setProvider('openai')">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M22.282 9.821a5.985 5.985 0 00-.516-4.91 6.046 6.046 0 00-6.51-2.9A6.065 6.065 0 004.981 4.18a5.985 5.985 0 00-3.998 2.9 6.046 6.046 0 00.743 7.097 5.98 5.98 0 00.51 4.911 6.051 6.051 0 006.515 2.9A5.985 5.985 0 0013.26 24a6.056 6.056 0 005.772-4.206 5.99 5.99 0 003.997-2.9 6.056 6.056 0 00-.747-7.073zm-9.022 12.609a4.476 4.476 0 01-2.876-1.04l.141-.081 4.779-2.758a.795.795 0 00.392-.681v-6.737l2.02 1.168a.071.071 0 01.038.052v5.583a4.504 4.504 0 01-4.494 4.494zM3.6 18.304a4.47 4.47 0 01-.535-3.014l.142.085 4.783 2.759a.771.771 0 00.78 0l5.843-3.369v2.332a.08.08 0 01-.032.067L9.37 19.946a4.497 4.497 0 01-5.77-1.642zM2.34 7.896a4.485 4.485 0 012.366-1.973V11.6a.766.766 0 00.388.676l5.815 3.355-2.02 1.168a.076.076 0 01-.071 0L4.01 14.115A4.485 4.485 0 012.34 7.896zm16.597 3.855l-5.843-3.372L15.114 7.2a.076.076 0 01.071 0l4.808 2.768a4.496 4.496 0 01-.676 8.105v-5.678a.79.79 0 00-.38-.644zm2.01-3.023l-.141-.085-4.774-2.782a.776.776 0 00-.785 0L9.409 9.23V6.897a.066.066 0 01.028-.061l4.807-2.767a4.496 4.496 0 016.675 4.66zm-12.64 4.135l-2.02-1.164a.08.08 0 01-.038-.057V6.075a4.496 4.496 0 017.375-3.453l-.142.08-4.778 2.758a.795.795 0 00-.393.681zm1.097-2.365l2.602-1.5 2.607 1.5v2.999l-2.597 1.5-2.607-1.5z"/></svg>
            <span>OpenAI</span>
          </button>
          <button class="ptab" id="tab-gem" onclick="setProvider('gemini')">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 24A14.304 14.304 0 000 12 14.304 14.304 0 0012 0a14.305 14.305 0 0012 12 14.305 14.305 0 00-12 12"/></svg>
            <span>Gemini</span>
            <span class="ptab-free">ฟรี</span>
          </button>
        </div>

        <!-- MODE BADGE -->
        <div class="mode-badge auto" id="mode-badge">
          <div class="mode-badge-dot"></div>
          <span id="mode-text">Auto mode — ไม่ต้องใส่ key ก็ใช้ได้</span>
        </div>

        <!-- API KEY INPUT (hidden when auto) -->
        <div id="key-section" style="display:none">
          <div class="field">
            <label class="flabel" id="key-label">API Key</label>
            <input class="finput" type="password" id="apikey" placeholder="" oninput="onKeyInput(this.value)">
            <div class="fhint" id="key-hint"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-head">
        <span class="card-title"><span class="card-title-dot" style="background:var(--amber)"></span>เนื้อหาบทความ</span>
        <span id="cbadge" style="font-family:var(--mono);font-size:10px;color:var(--tx3)">0 ตัวอักษร</span>
      </div>
      <div class="card-body">
        <textarea class="finput" id="txt"
          placeholder="วางเนื้อหาบทความที่นี่...&#10;&#10;ระบบจะสร้าง SEO · GEO · AEO metadata&#10;ครบ 5 รูปแบบ พร้อม&#10;• SEO Keyword  • Meta Description&#10;• SEO Title  • Facebook Title&#10;• Twitter (X)  • URL Slug  • Alt Text"
          oninput="onTxt(this.value)"></textarea>
        <div class="charrow">
          <span id="ccount">0 ตัวอักษร</span>
          <span>แนะนำ 200+ ตัวอักษร</span>
        </div>
        <button class="genbtn" id="genbtn" onclick="generate()" disabled>
          <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
          Generate 5 รูปแบบ
        </button>
      </div>
    </div>
  </div>

  <!-- RIGHT: OUTPUT -->
  <div class="out-col" id="out-col">
    <div class="loader" id="loader">
      <div class="spin"></div>
      <span id="ltxt">กำลังวิเคราะห์...</span>
    </div>
    <div class="empty" id="empty">
      <div class="empty-icon">✦</div>
      <div>วางเนื้อหาแล้วกด Generate</div>
      <small>ไม่ต้องใส่ API Key ก็ใช้ได้</small>
    </div>
    <div id="results"></div>
  </div>

</div>

<div class="toast" id="toast">
  <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
  <span id="tmsg">Copied!</span>
</div>

<script>
// ── STATE ───────────────────────────────────────────────
let provider = 'free'
let _cards = [], _allText = ''

// ── PROVIDER CONFIG ─────────────────────────────────────
const PC = {
  free:      { label: '',          placeholder: '', hint: '', link: '', validate: ()=>true },
  anthropic: { label: 'Anthropic API Key', placeholder: 'sk-ant-api03-...', hint: 'ราคา ~0.003 บาท/บทความ · <a href="https://console.anthropic.com" target="_blank">รับ Key ที่นี่</a>', link: '', validate: v => v.startsWith('sk-ant-') },
  openai:    { label: 'OpenAI API Key',    placeholder: 'sk-proj-...',       hint: 'ใช้ GPT-4o-mini ประหยัด · <a href="https://platform.openai.com/api-keys" target="_blank">รับ Key ที่นี่</a>', link: '', validate: v => v.startsWith('sk-') },
  gemini:    { label: 'Google Gemini API Key', placeholder: 'AIzaSy...',    hint: 'ฟรี 15 req/นาที · ใช้ Gemini 2.0 Flash · <a href="https://aistudio.google.com/app/apikey" target="_blank">รับ Key ฟรีที่นี่</a>', link: '', validate: v => v.length > 15 },
}

// ── SYSTEM PROMPT ───────────────────────────────────────
const SYS = `คุณคือผู้เชี่ยวชาญ SEO GEO AEO ปี 2026 สำหรับเว็บข่าวภาษาไทย
ตอบด้วย JSON เท่านั้น ห้ามมีข้อความอื่น ห้าม markdown
format: {"results":[{"num":1,"focus":"...","keyword":"...","meta":"...","seo_title":"...","fb_title":"...","twitter":"...","slug":"...","alt_text":"..."}],"extras":{"schema_type":"...","keyword_density":"...","internal_linking":"...","geo_entities":"..."}}
กฎ: meta ห้ามมี " และ , ความยาว 120-650 ตัวอักษร | seo_title ไม่เกิน 60 ตัวอักษร ไม่มี " | slug ภาษาอังกฤษ lowercase hyphen ไม่มีปี ไม่เกิน 6 คำ | 5 focus: 1=High Search Volume 2=Emotional Hook 3=GEO AI-ready 4=AEO Voice Search 5=Balanced`

// ── PROVIDER SWITCH ─────────────────────────────────────
function setProvider(p) {
  provider = p
  document.querySelectorAll('.ptab').forEach(t => t.classList.remove('active'))
  const tabMap = { free:'tab-free', anthropic:'tab-ant', openai:'tab-oai', gemini:'tab-gem' }
  document.getElementById(tabMap[p])?.classList.add('active')

  const ks = document.getElementById('key-section')
  const mb = document.getElementById('mode-badge')
  const mt = document.getElementById('mode-text')

  if (p === 'free') {
    ks.style.display = 'none'
    mb.className = 'mode-badge auto'
    mt.textContent = 'Auto mode — ไม่ต้องใส่ key ก็ใช้ได้'
    document.getElementById('sdot').className = 'sdot ok'
    document.getElementById('stext').textContent = 'Auto mode'
  } else {
    ks.style.display = 'block'
    mb.className = 'mode-badge api'
    mt.textContent = 'AI mode — ผลลัพธ์แม่นยำกว่า'
    document.getElementById('key-label').textContent = PC[p].label
    document.getElementById('apikey').placeholder = PC[p].placeholder
    document.getElementById('apikey').value = ''
    document.getElementById('key-hint').innerHTML = PC[p].hint
    document.getElementById('sdot').className = 'sdot'
    document.getElementById('stext').textContent = 'ใส่ API Key'
  }
  checkReady()
}

// ── RULE-BASED AUTO MODE (no API) ───────────────────────
const STOP = new Set(['และ','ของ','ที่','ใน','มี','ให้','การ','จาก','โดย','ได้','นี้','เป็น','กับ','แต่','หรือ','ซึ่ง','จะ','มา','ไม่','เพื่อ','ว่า','ไป','ออก','ขึ้น','ลง','ก็','ทำ','นั้น','อยู่','แล้ว','ต้อง','ทาง','ถึง','ตาม','ทั้ง','เข้า','ส่ง','กัน','อีก','เมื่อ','เรา','เขา','มัน','คือ','ใช้','ด้วย','ต่อ','ความ','เริ่ม','ดัง','เพราะ','จึง'])

const TH2EN = [
  ['เศรษฐกิจ','economy'],['การเงิน','finance'],['เงิน','money'],['ราคา','price'],
  ['ตลาด','market'],['หุ้น','stock'],['ดอกเบี้ย','interest'],['ลงทุน','invest'],
  ['ธนาคาร','bank'],['ภาษี','tax'],['รัฐบาล','government'],['นโยบาย','policy'],
  ['เลือกตั้ง','election'],['กฎหมาย','law'],['เทคโนโลยี','tech'],['ดิจิทัล','digital'],
  ['ปัญญาประดิษฐ์','ai'],['คริปโต','crypto'],['น้ำมัน','oil'],['พลังงาน','energy'],
  ['สิ่งแวดล้อม','environment'],['สุขภาพ','health'],['โรค','disease'],['วัคซีน','vaccine'],
  ['การศึกษา','education'],['กีฬา','sport'],['บันเทิง','entertainment'],['ภาพยนตร์','film'],
  ['ดนตรี','music'],['ท่องเที่ยว','travel'],['ธุรกิจ','business'],['บริษัท','company'],
  ['ข่าว','news'],['รายงาน','report'],['วิเคราะห์','analysis'],['ประกาศ','announced'],
  ['ไทย','thailand'],['จีน','china'],['สหรัฐ','usa'],['ยุโรป','europe'],
  ['ญี่ปุ่น','japan'],['เกาหลี','korea'],['อาเซียน','asean'],
]

function autoGenerate(text) {
  const words = (text.match(/[\u0E00-\u0E7F]{3,}|[a-zA-Z]{3,}/g) || [])
    .filter(w => !STOP.has(w) && !/^[A-Z][a-z]/.test(w))
  const freq = {}
  words.forEach(w => freq[w] = (freq[w]||0)+1)
  const kws = Object.entries(freq).sort((a,b)=>b[1]-a[1]).map(e=>e[0])

  const lines = text.split('\n').map(l=>l.trim()).filter(Boolean)
  const topic = lines.find(l => l.length > 10 && l.length < 100) || text.substring(0,80)
  const shortTopic = topic.length > 55 ? topic.substring(0,52)+'...' : topic
  const kw = kws[0] || topic.substring(0,20)

  // slug
  let slugParts = []
  for (const [th,en] of TH2EN) {
    if (text.includes(th) && !slugParts.includes(en)) { slugParts.push(en); if(slugParts.length>=3) break }
  }
  const enW = (text.match(/\b[a-z][a-z0-9]{2,}\b/gi)||[]).filter(w=>!['the','and','for','are','but','not','was','has'].includes(w.toLowerCase())).map(w=>w.toLowerCase())
  enW.slice(0,2).forEach(w=>{ if(!slugParts.includes(w) && slugParts.length<4) slugParts.push(w) })
  const slug = slugParts.slice(0,5).join('-') || 'news-article'

  // meta base
  const clean = text.replace(/\s+/g,' ').trim()
  const sentences = clean.split(/[.!?]/).map(s=>s.trim()).filter(s=>s.length>20)
  const core = (sentences.find(s=>s.includes(kw))||sentences[0]||clean).substring(0,250)

  // schema
  let schema = 'NewsArticle'
  if (text.includes('วิธี')||text.includes('ขั้นตอน')) schema='HowTo'
  else if (text.includes('คำถาม')||text.includes('FAQ')) schema='FAQPage'
  else if (!text.includes('ข่าว')&&!text.includes('รายงาน')) schema='Article'

  const altText = `${kw} - ${topic}`.replace(/[",]/g,'').substring(0,125)

  return {
    results: [
      { num:1, focus:'High Search Volume', keyword:kw,
        meta:`${kw} — ${core} อัปเดตข้อมูลล่าสุดและติดตามความเคลื่อนไหวได้ที่นี่`.replace(/[",]/g,'').substring(0,650),
        seo_title:`${shortTopic}`.substring(0,60), fb_title:`เปิดทุกข้อมูล ${topic}`, twitter:`${topic} — อ่านก่อนใคร`, slug, alt_text:altText },
      { num:2, focus:'Emotional Hook', keyword:kws[1]||kw,
        meta:`รู้จัก${topic}ให้ลึกขึ้น ${core} ทำไมเรื่องนี้ถึงกระทบคุณโดยตรง`.replace(/[",]/g,'').substring(0,650),
        seo_title:`ทำไม ${(kws[1]||kw).substring(0,20)} ถึงสำคัญตอนนี้`.substring(0,60), fb_title:`เรื่องของ ${topic} ที่คนส่วนใหญ่ยังไม่รู้`, twitter:`${topic} — เรื่องที่คุณไม่ควรพลาด`, slug:`${slug}-explained`, alt_text:altText },
      { num:3, focus:'GEO — AI Ready', keyword:kws[2]||kw,
        meta:`${topic} ${core} นี่คือข้อมูลที่ถูกต้องและครบถ้วนสำหรับการค้นหาบน AI Search`.replace(/[",]/g,'').substring(0,650),
        seo_title:`${shortTopic} ข้อมูลครบถ้วน`.substring(0,60), fb_title:`${topic}: ข้อเท็จจริงที่ AI ยืนยัน`, twitter:`${topic} — ข้อมูลที่ AI อ้างอิงได้`, slug:`${slug}-facts`, alt_text:altText },
      { num:4, focus:'AEO — Voice Search', keyword:kw,
        meta:`ถามว่า${kw}คืออะไร ตอบได้เลยว่า ${core} ค้นหาข้อมูลเพิ่มเติมได้ที่นี่`.replace(/[",]/g,'').substring(0,650),
        seo_title:`${kw} คืออะไร ตอบทุกคำถาม`.substring(0,60), fb_title:`ทุกคำถามเกี่ยวกับ ${topic} ตอบได้ที่นี่`, twitter:`${topic} — คำถามที่คนถามมากที่สุด`, slug:`${slug}-guide`, alt_text:altText },
      { num:5, focus:'Balanced All-in-one', keyword:kw,
        meta:`${core} ครบทุกมุมมองเกี่ยวกับ${topic} พร้อมวิเคราะห์เชิงลึกและข้อมูลล่าสุด`.replace(/[",]/g,'').substring(0,650),
        seo_title:`${shortTopic}`.substring(0,60), fb_title:`${topic} — วิเคราะห์และอัปเดตล่าสุด`, twitter:`${topic} | ${kw}`, slug, alt_text:altText },
    ],
    extras: {
      schema_type: schema,
      keyword_density: `แนะนำใส่ "${kw}" ในบทความ 2–3 ครั้ง`,
      internal_linking: `หัวข้อที่เกี่ยวข้องกับ ${kw} และ ${kws[1]||topic}`,
      geo_entities: kws.slice(0,5).join(', ')
    }
  }
}

// ── API CALLS ───────────────────────────────────────────
async function callAnthropic(key, text) {
  const r = await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:4096,system:SYS,messages:[{role:'user',content:`วิเคราะห์และสร้าง SEO GEO AEO 5 รูปแบบ:\n\n${text}`}]})})
  if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.error?.message||`Anthropic ${r.status}`)}
  const d=await r.json();return d.content[0].text
}
async function callOpenAI(key, text) {
  const r = await fetch('https://api.openai.com/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${key}`},body:JSON.stringify({model:'gpt-4o-mini',max_tokens:4096,messages:[{role:'system',content:SYS},{role:'user',content:`วิเคราะห์และสร้าง SEO GEO AEO 5 รูปแบบ:\n\n${text}`}]})})
  if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.error?.message||`OpenAI ${r.status}`)}
  const d=await r.json();return d.choices[0].message.content
}
async function callGemini(key, text) {
  // ลอง gemini-2.0-flash ก่อน ถ้าไม่ได้ fallback เป็น gemini-1.5-flash-latest
  const models = ['gemini-2.0-flash', 'gemini-1.5-flash-latest', 'gemini-1.5-flash']
  let lastErr = null
  for (const model of models) {
    try {
      const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contents:[{parts:[{text:SYS+'\n\nวิเคราะห์และสร้าง SEO GEO AEO 5 รูปแบบ:\n\n'+text}]}],generationConfig:{maxOutputTokens:4096,temperature:0.7}})})
      if (r.status === 404) { lastErr = new Error(`Model ${model} not found`); continue }
      if (!r.ok) { const e=await r.json().catch(()=>({})); throw new Error(e.error?.message||`Gemini ${r.status}`) }
      const d=await r.json()
      return d.candidates[0].content.parts[0].text
    } catch(e) {
      if (e.message.includes('not found') || e.message.includes('not supported')) { lastErr=e; continue }
      throw e
    }
  }
  throw lastErr || new Error('Gemini: ไม่พบ model ที่รองรับ')
}

// ── GENERATE ────────────────────────────────────────────
const lmsgs = ['กำลังวิเคราะห์...','คิด keyword...','เขียน Meta...','สร้าง Slug...','ประมวลผล 5 รูปแบบ...']
let lt = null

async function generate() {
  const text = document.getElementById('txt').value.trim()
  if (!text) return

  document.getElementById('empty').style.display = 'none'
  document.getElementById('results').innerHTML = ''
  document.getElementById('loader').classList.add('show')
  document.getElementById('genbtn').disabled = true
  document.getElementById('cpall-btn')?.style && (document.getElementById('cpall-btn').style.display='none')
  let li=0; lt=setInterval(()=>{ li=(li+1)%lmsgs.length; document.getElementById('ltxt').textContent=lmsgs[li] },900)

  try {
    let data
    if (provider === 'free') {
      await new Promise(r=>setTimeout(r,400)) // small delay for UX
      data = autoGenerate(text)
    } else {
      const key = document.getElementById('apikey').value.trim()
      let raw
      if (provider==='anthropic') raw = await callAnthropic(key,text)
      else if (provider==='openai') raw = await callOpenAI(key,text)
      else if (provider==='gemini') raw = await callGemini(key,text)
      try {
        const c=raw.replace(/```json|```/gi,'').trim()
        const s=c.indexOf('{'), e=c.lastIndexOf('}')
        data=JSON.parse(c.substring(s,e+1))
      } catch { throw new Error('Parse error — กรุณาลองใหม่') }
    }
    clearInterval(lt)
    document.getElementById('loader').classList.remove('show')
    renderResults(data)
  } catch(err) {
    clearInterval(lt)
    document.getElementById('loader').classList.remove('show')
    document.getElementById('genbtn').disabled = false
    document.getElementById('empty').style.display = 'flex'
    document.getElementById('empty').innerHTML = `<div class="empty-icon" style="background:rgba(255,59,48,0.1)">⚠</div><div style="color:var(--red)">${esc(err.message)}</div><small>กรุณาตรวจสอบ API Key แล้วลองใหม่</small>`
  }
}

// ── RENDER ──────────────────────────────────────────────
function renderResults(data) {
  const {results, extras} = data
  const c = document.getElementById('results')
  _cards=[]; _allText=''

  // copy all btn
  let cpAllHtml = `<div style="display:flex;justify-content:flex-end;margin-bottom:4px"><button id="cpall-btn" class="cpall-btn" onclick="copyAll()" style="display:inline-block">Copy ทั้งหมด</button></div>`

  let html = cpAllHtml
  results.forEach((r,i) => {
    const ct=[`รูปแบบที่ ${r.num} — ${r.focus}`,`❇️ SEO Keyword: ${r.keyword}`,`❇️ Meta Description: ${r.meta}`,`❇️ SEO Title: ${r.seo_title}`,`❇️ Facebook Title: ${r.fb_title}`,`❇️ Twitter (X): ${r.twitter}`,`❇️ URL Slug: /${r.slug}`,`❇️ Alt Text: ${r.alt_text}`].join('\n')
    _cards.push(ct); _allText+=ct+'\n\n---\n\n'
    html+=`<div class="rcard" style="animation-delay:${i*.07}s">
      <div class="rcard-head">
        <span><span class="rcard-num">รูปแบบที่ ${r.num}</span><span class="rcard-focus">— ${esc(r.focus)}</span></span>
        <button class="cpbtn" onclick="copyCard(${i},this)">Copy</button>
      </div>
      <div class="rcard-body">
        <div class="frow"><span class="flbl2">SEO Keyword</span><span class="fval kw">${esc(r.keyword)}</span></div>
        <div class="hdiv"></div>
        <div class="frow"><span class="flbl2">Meta Description</span><span class="fval meta">${esc(r.meta)}</span></div>
        <div class="hdiv"></div>
        <div class="frow"><span class="flbl2">SEO Title</span><span class="fval">${esc(r.seo_title)}</span></div>
        <div class="frow"><span class="flbl2">Facebook Title</span><span class="fval">${esc(r.fb_title)}</span></div>
        <div class="frow"><span class="flbl2">Twitter (X)</span><span class="fval">${esc(r.twitter)}</span></div>
        <div class="hdiv"></div>
        <div class="frow"><span class="flbl2">URL Slug</span><span class="fval slug">/${esc(r.slug)}</span></div>
        <div class="frow"><span class="flbl2">Alt Text</span><span class="fval meta">${esc(r.alt_text)}</span></div>
      </div>
    </div>`
  })

  if (extras) {
    _allText+=`💡 เพิ่มเติม\n• Schema: ${extras.schema_type}\n• ${extras.keyword_density}\n• Internal Linking: ${extras.internal_linking}\n• GEO Entities: ${extras.geo_entities}`
    html+=`<div class="extras" style="animation-delay:.35s">
      <div class="etitle">💡 Schema · Entity · GEO</div>
      <div class="ebody">
        <div>• <strong>Schema Type:</strong> ${esc(extras.schema_type)}</div>
        <div>• <strong>Keyword Density:</strong> ${esc(extras.keyword_density)}</div>
        <div>• <strong>Internal Linking:</strong> ${esc(extras.internal_linking)}</div>
        <div>• <strong>GEO Entities:</strong> ${esc(extras.geo_entities)}</div>
      </div>
    </div>`
  }

  c.innerHTML = html
  document.getElementById('genbtn').disabled = false
  showToast(provider==='free' ? 'สร้าง 5 รูปแบบสำเร็จ (Auto mode)' : 'สร้าง 5 รูปแบบสำเร็จ!')
}

// ── COPY ────────────────────────────────────────────────
function copyCard(i,btn) {
  navigator.clipboard.writeText(_cards[i]).then(()=>{btn.textContent='Copied!';btn.classList.add('ok');setTimeout(()=>{btn.textContent='Copy';btn.classList.remove('ok')},2000);showToast('Copied รูปแบบที่'+(i+1))})
}
function copyAll() {
  navigator.clipboard.writeText(_allText).then(()=>showToast('Copied ทั้งหมดแล้ว!'))
}

// ── UTILS ───────────────────────────────────────────────
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')

function onTxt(v) {
  const n=v.length
  document.getElementById('ccount').textContent=n+' ตัวอักษร'
  document.getElementById('cbadge').textContent=n+' ตัวอักษร'
  checkReady()
}
function onKeyInput(v) {
  const ok=PC[provider].validate(v.trim())
  document.getElementById('sdot').className='sdot'+(ok?' ai':'')
  document.getElementById('stext').textContent=ok?'API Key พร้อม':'ใส่ API Key'
  checkReady()
}
function checkReady() {
  const hasContent = document.getElementById('txt').value.trim().length > 30
  let keyOk = true
  if (provider !== 'free') {
    const key = document.getElementById('apikey').value.trim()
    keyOk = PC[provider].validate(key)
  }
  document.getElementById('genbtn').disabled = !(hasContent && keyOk)
}
function showToast(msg) {
  const t=document.getElementById('toast')
  document.getElementById('tmsg').textContent=msg
  t.classList.add('show')
  setTimeout(()=>t.classList.remove('show'),2200)
}

// init
checkReady()
</script>
